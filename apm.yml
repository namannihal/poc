# MigrateKit — APM package manifest
# Schema: https://aka.ms/apm
#
# MigrateKit is a thin orchestrator. It does NOT re-implement IaC or pipeline
# generation — it reuses the IaC_Terraform_Agent_4LMP toolkit (declared as a
# dependency below) behind a repo-file manifest and a SAD-only bootstrap workflow.

name: migrate-kit
version: 0.2.0
description: >-
  MigrateKit — orchestrates an application's Azure LMP migration from GitHub
  Copilot / VS Code via a SAD-only bootstrap workflow. `/migrate-app` scaffolds a
  per-app folder, you drop in a SAD, and MigrateKit sequences the reused
  IaC_Terraform_Agent_4LMP toolkit (extract -> analyse -> CPF map -> Terraform ->
  validate -> canonical GitLab pipeline) as a resumable, idempotent,
  manifest-tracked flow. No AI Migrate and no /assess in this version.
author: GHCP-IP
license: internal

# --- Primitives shipped by this package ---
agents:
  - .apm/agents/migrate-kit.agent.md

prompts:
  - .apm/prompts/migrate-app.prompt.md
  - .apm/prompts/extract-sad-to-markdown.prompt.md
  - .apm/prompts/analyse-sad.prompt.md
  - .apm/prompts/map-cpf-modules.prompt.md
  - .apm/prompts/generate-iac-scaffolding.prompt.md
  - .apm/prompts/generate-pipeline.prompt.md

instructions:
  - .apm/instructions/workflow.instructions.md
  - .apm/instructions/pipeline-format.instructions.md

# --- Reused capability (wrapped, not copied) ---
# The IaC toolkit provides the SAD analysis, CPF module mapping, IaC scaffolding,
# and the underlying GitLab CI generation that /generate-pipeline reshapes into
# the canonical format. MigrateKit delegates to these prompts/skills/templates.
dependencies:
  apm:
    - <org>/agents/IaC_Terraform_Agent_4LMP

# --- Governance ---
# No secrets are bundled. CPF/Artifactory/GitLab tokens stay in the consuming
# environment. Any MCP servers remain opt-in and are gated by apm-policy.yml.
